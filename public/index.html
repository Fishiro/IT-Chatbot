        <link rel="stylesheet" href="style.css" />

        <style>
            /* Khóa quét chọn */
            .ui-locked {
                -webkit-user-select: none;
                -moz-user-select: none;
                -ms-user-select: none;
                user-select: none;
            }

            /* Jelly Logic */
            .jelly-squeeze {
                transform: scale(0.97, 0.98) translateY(1px);
                filter: saturate(1.1) brightness(1.02);
                transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            }

            @keyframes jelly-spring {
                0% {
                    transform: scale(0.97, 0.98);
                }
                40% {
                    transform: scale(1.02, 0.99);
                }
                70% {
                    transform: scale(0.99, 1);
                }
                100% {
                    transform: scale(1, 1);
                }
            }

            .jelly-release {
                animation: jelly-spring 0.8s cubic-bezier(0.25, 1, 0.5, 1);
                will-change: transform;
            }

            /* Spring CSS Input */
            .panel-spring-wrapper {
                transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
                will-change: transform;
            }
            .panel-spring-wrapper:active {
                transform: scale(0.99) translateY(2px);
                transition: transform 0.1s cubic-bezier(0.2, 0, 0.2, 1);
            }
            .panel-spring-wrapper:focus-within {
                transform: scale(1.01) translateY(-1px);
            }
            .panel-spring-wrapper:focus-within:active:not(
                    :has(#send-btn:active)
                ) {
                transform: scale(0.995) translateY(1px);
            }
            .panel-spring-wrapper:has(#send-btn:active):active {
                transform: scale(1.01) translateY(-1px);
            }

            #chat-input-container {
                transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            }

            /* SỬA: Loại bỏ viền ở thanh input, dùng Box-shadow hiện đại */
            .panel-spring-wrapper:has(#send-btn:active) #chat-input-container {
                transform: translateX(-4px) scale(0.995);
                background-color: rgba(255, 255, 255, 0.95);
                box-shadow: 0 15px 40px rgba(56, 189, 248, 0.2);
                border: none !important;
                transition: all 0.1s cubic-bezier(0.2, 0, 0.2, 1);
            }

            .dark
                .panel-spring-wrapper:has(#send-btn:active)
                #chat-input-container {
                background-color: rgba(30, 41, 59, 0.95);
                box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
                border: none !important;
            }

            .btn-send-spring {
                transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            }
            .btn-send-spring:active {
                transform: scale(0.75) rotate(-12deg) !important;
                box-shadow: 0 0 25px rgba(56, 189, 248, 0.6);
                transition: all 0.1s cubic-bezier(0.2, 0, 0.2, 1);
            }

            /* --- CUSTOM CSS: LOẠI BỎ VIỀN, DÙNG BÓNG ĐỔ (SHADOW) --- */

            /* Sidebar */
            .sidebar-glass {
                background: rgba(255, 255, 255, 0.5);
                backdrop-filter: blur(20px);
                -webkit-backdrop-filter: blur(20px);
                border: none !important; /* Xóa viền đen/trắng */
                box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04); /* Bóng nhẹ */
                transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1);
            }

            .dark .sidebar-glass {
                background: rgba(15, 23, 42, 0.65);
                box-shadow: 0 15px 50px rgba(0, 0, 0, 0.4); /* Bóng sâu hơn trong Dark Mode */
            }

            /* TÍNH NĂNG MỚI: Hiệu ứng nhấn lò xo tinh tế cho Sidebar */
            .sidebar-spring {
                transition:
                    transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1),
                    box-shadow 0.6s ease;
                will-change: transform;
            }
            .sidebar-spring:active {
                transform: scale(0.985) translateY(2px);
                box-shadow: 0 5px 15px rgba(0, 0, 0, 0.02) !important;
                transition:
                    transform 0.1s cubic-bezier(0.2, 0, 0.2, 1),
                    box-shadow 0.1s ease;
            }
            .dark .sidebar-spring:active {
                box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2) !important;
            }

            /* TÍNH NĂNG MỚI: Nút Đoạn chat mới (Solid Modern + Smooth Animation) */
            .btn-modern-glass {
                background: #394e5a; /* Màu đặc nguyên bản của bạn cho Light Mode */
                color: #38bdf8;
                border: none !important;
                transition:
                    all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1),
                    background-color 0.3s ease;
                will-change: transform, box-shadow;
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08); /* Bóng cơ bản nhẹ nhàng */
            }
            .dark .btn-modern-glass {
                background: #1e293b; /* Màu đặc cho Dark Mode */
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            }
            .btn-modern-glass:hover {
                transform: scale(1.02) translateY(-1px);
                /* Bóng Glow tỏa sáng màu xanh nhạt cực kỳ hiện đại */
                box-shadow: 0 12px 25px -5px rgba(56, 189, 248, 0.35);
                background: #475f6d; /* Sáng hơn một chút khi di chuột */
            }
            .dark .btn-modern-glass:hover {
                background: #2d3b4e;
                box-shadow: 0 12px 25px -5px rgba(56, 189, 248, 0.25);
            }
            .btn-modern-glass:active {
                transform: scale(0.97) translateY(1px);
                box-shadow: 0 2px 10px rgba(56, 189, 248, 0.15);
                transition: all 0.1s cubic-bezier(0.2, 0, 0.2, 1);
            }
            /* Hiệu ứng xoay icon mượt mà */
            .btn-modern-glass svg {
                transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            }
            .btn-modern-glass:hover svg {
                transform: rotate(90deg) scale(1.1);
            }

            /* Ghi đè toàn bộ Bong bóng chat (Xóa border, thêm màu mới từ ảnh) */
            .message {
                border: none !important; /* Xóa mọi loại viền */
                transition:
                    background-color 0.7s ease,
                    color 0.7s ease,
                    box-shadow 0.7s ease;
            }

            /* Bot (Sáng) */
            .message.bot {
                background-color: #ffffff !important;
                color: #1b1b1e !important;
                box-shadow: 0 8px 24px rgba(149, 157, 165, 0.08) !important; /* Bóng nhẹ nâng khối */
            }

            /* User (Sáng) - Màu Vàng Cam tích cực từ hình ảnh */
            .message.user {
                background-color: #ffad1f !important;
                color: #1b1b1e !important;
                box-shadow: 0 8px 24px rgba(255, 173, 31, 0.25) !important;
            }

            /* Bot (Tối) */
            .dark .message.bot {
                background-color: #1e293b !important;
                color: #f8fafc !important;
                box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3) !important;
            }

            /* User (Tối) */
            .dark .message.user {
                background-color: #38bdf8 !important;
                color: #0f172a !important;
                box-shadow: 0 8px 24px rgba(56, 189, 248, 0.15) !important;
            }

            /* Fix chữ P cho bot để tránh margin dư */
            .message.bot p {
                margin-bottom: 0.5rem;
            }
            .message.bot p:last-child {
                margin-bottom: 0;
            }

            /* =========================================
               1. LỚP PHỦ GRADIENT KÍNH (BOTTOM GLASS)
               ========================================= */
            .bottom-glass-gradient {
                position: absolute;
                bottom: 0;
                left: 0;
                width: 100%;
                height: 180px; /* Độ cao vùng mờ */
                /* Màu nền tương thích với bg-[#F4F9FD] ban đầu */
                background: linear-gradient(
                    to top,
                    rgba(244, 249, 253, 0.95) 10%,
                    rgba(244, 249, 253, 0) 100%
                );
                backdrop-filter: blur(12px);
                -webkit-backdrop-filter: blur(12px);
                -webkit-mask-image: linear-gradient(
                    to top,
                    black 30%,
                    transparent 100%
                );
                mask-image: linear-gradient(
                    to top,
                    black 30%,
                    transparent 100%
                );
                pointer-events: none;
                z-index: 15; /* Nằm dưới input (z-20) nhưng trên chat (z-10) */
                transition: background 0.8s ease-in-out;
            }

            /* Kính ở Dark Mode tương thích với bg-[#0B1121] */
            .dark .bottom-glass-gradient {
                background: linear-gradient(
                    to top,
                    rgba(11, 17, 33, 0.95) 10%,
                    rgba(11, 17, 33, 0) 100%
                );
            }

            /* =========================================
               2. ANIMATION TRẠNG THÁI "ĐANG ĐỢI AI" (BLUR)
               ========================================= */
            .input-wrapper {
                transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
                opacity: 1;
                filter: blur(0px);
            }

            .waiting-overlay {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                background: rgba(255, 255, 255, 0.6);
                backdrop-filter: blur(8px);
                -webkit-backdrop-filter: blur(8px);
                opacity: 0;
                visibility: hidden;
                transform: scale(0.95);
                transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
                font-weight: 500;
                color: #38bdf8; /* Màu xanh chủ đạo của nút Send */
                font-size: 16px;
                z-index: 20;
                border-radius: 32px; /* Trùng với viền chat-input-container */
            }

            .dark .waiting-overlay {
                background: rgba(30, 41, 59, 0.6);
            }

            /* Khi bật class .is-waiting */
            #chat-input-container.is-waiting {
                box-shadow: 0 5px 20px rgba(56, 189, 248, 0.15);
            }
            .dark #chat-input-container.is-waiting {
                box-shadow: 0 5px 20px rgba(56, 189, 248, 0.1);
            }

            #chat-input-container.is-waiting .input-wrapper {
                opacity: 0;
                filter: blur(10px);
                transform: scale(1.02);
                pointer-events: none;
            }

            #chat-input-container.is-waiting .waiting-overlay {
                opacity: 1;
                visibility: visible;
                transform: scale(1);
            }

            /* Animation dấu ba chấm */
            .loading-dots span {
                animation: bounce 1.4s infinite ease-in-out both;
                display: inline-block;
            }
            .loading-dots span:nth-child(1) {
                animation-delay: -0.32s;
            }
            .loading-dots span:nth-child(2) {
                animation-delay: -0.16s;
            }

            @keyframes bounce {
                0%,
                80%,
                100% {
                    transform: translateY(0);
                }
                40% {
                    transform: translateY(-4px);
                }
            }
        </style>

        <script>
            // JELLY LOGIC (Vẫn giữ lại cho các phần tử khác nếu sau này bạn dùng)
            document.querySelectorAll(".jelly-trigger").forEach((el) => {
                el.addEventListener("mousedown", () => {
                    el.classList.remove("jelly-release");
                    el.classList.add("jelly-squeeze");
                });

                const release = () => {
                    if (el.classList.contains("jelly-squeeze")) {
                        el.classList.remove("jelly-squeeze");
                        void el.offsetWidth;
                        el.classList.add("jelly-release");
                    }
                };

                el.addEventListener("mouseup", release);
                el.addEventListener("mouseleave", release);
                el.addEventListener("animationend", (e) => {
                    if (e.animationName === "jelly-spring") {
                        el.classList.remove("jelly-release");
                    }
                });
            });

            // LOGIC CHUYỂN ĐỔI SÁNG TỐI
            const themeToggleBtn = document.getElementById("theme-toggle");
            const htmlEl = document.documentElement;

            if (localStorage.getItem("theme") === "dark") {
                htmlEl.classList.add("dark");
            }

            themeToggleBtn.addEventListener("click", () => {
                htmlEl.classList.toggle("dark");
                const isDark = htmlEl.classList.contains("dark");
                localStorage.setItem("theme", isDark ? "dark" : "light");
            });

            // --- HÀM HỖ TRỢ HIỆU ỨNG CHỜ AI ---
            window.toggleAIWaitingState = function (isWaiting) {
                const inputContainer = document.getElementById(
                    "chat-input-container",
                );
                const userInput = document.getElementById("user-input");

                if (isWaiting) {
                    inputContainer.classList.add("is-waiting");
                    if (userInput) {
                        userInput.blur();
                    }
                } else {
                    inputContainer.classList.remove("is-waiting");
                    if (userInput) {
                        userInput.focus();
                    }
                }
            };

            // TÍNH NĂNG MỚI: THEO DÕI VÙNG CHAT ĐỂ ĐỒNG BỘ HIỆU ỨNG (KHÔNG GÂY LỖI SCOPE)
            // Đặt trong cặp ngoặc nhọn {} để tạo "phòng cách ly" (Block Scope),
            // đảm bảo biến không bị đụng hàng với script.js
            {
                const chatArea = document.getElementById("chat-messages");
                if (chatArea) {
                    const chatObserver = new MutationObserver((mutations) => {
                        mutations.forEach((mutation) => {
                            if (mutation.addedNodes.length > 0) {
                                mutation.addedNodes.forEach((node) => {
                                    if (node.nodeType === 1) {
                                        const isUserMessage =
                                            node.classList.contains("user") ||
                                            node.querySelector(".user");
                                        const isBotMessage =
                                            node.classList.contains("bot") ||
                                            node.querySelector(".bot");

                                        if (isUserMessage) {
                                            window.toggleAIWaitingState(true);
                                        } else if (isBotMessage) {
                                            window.toggleAIWaitingState(false);
                                        }
                                    }
                                });
                            }
                        });
                    });
                    chatObserver.observe(chatArea, {
                        childList: true,
                        subtree: true,
                    });
                }

                // Theo dõi thêm trạng thái loading nếu có
                const loadingBox = document.getElementById("loading");
                if (loadingBox) {
                    const loadingObserver = new MutationObserver(
                        (mutations) => {
                            mutations.forEach((mutation) => {
                                if (mutation.attributeName === "class") {
                                    if (
                                        loadingBox.classList.contains("hidden")
                                    ) {
                                        window.toggleAIWaitingState(false);
                                    }
                                }
                            });
                        },
                    );
                    loadingObserver.observe(loadingBox, { attributes: true });
                }
            }
        </script>

        <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
        <script src="script.js"></script>
    </body>
